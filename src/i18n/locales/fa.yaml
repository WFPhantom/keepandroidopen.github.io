# Meta
title: "اندروید را باز و آزاد نگه دارید"
description: "تلفن همراه شما در حال از دست رفتن است. از شهریور ۱۴۰۵، گوگل تمام برنامه‌های اندرویدی را که توسعه‌دهنده آن‌ها نام‌نویسی نکرده باشد، مسدود خواهد کرد."

# Hero
hero_lede: "تلفن همراه شما در حال از دست رفتن است."
hero_countdown_label: "روز دیگه تا دستور خانه‌نشینی"
hero_sub: >-
  از شهریور ۱۴۰۵، یک به‌روزرسانی بی‌صدا که بدون رضایت شما توسط گوگل اعمال می‌شود، **تمام برنامه‌های اندرویدی** که توسعه‌دهنده آن‌ها در گوگل نام‌نویسی نکرده باشه، قرارداد را امضا نکرده باشه، هزینه اشتراک را پرداخت نکرده باشه و هویت واقعی خود را ارائه نداده باشد، **مسدود خواهد شد**.
hero_kicker: "تمام برنامه‌ها، تمام دستگاه‌ها، در سراسر جهان — بدون هیچ راه انصرافی."

# What Google is doing
what_heading: "گوگل چه کاری انجام می‌دهد"
what_intro: >-
 در ۳ شهریور ۱۴۰۴، گوگل [اعلام](https://developer.android.com/developer-verification) کرد که از شهریور ۱۴۰۵، **تمام توسعه‌دهندگان برنامه‌های اندروید باید به‌صورت متمرکز در گوگل** نام‌نویسی کنند تا برنامه‌های‌شان روی هر دستگاهی قابل نصب باشد. نه فقط برنامه‌های پلی‌استور—بلکه همه برنامه‌ها. این شامل برنامه‌هایی می‌شود که بین دوستان هم‌رسانی قرار است بشود، از طریق [اف‌دروید](https://f-droid.org) منتشر می‌شوند یا توسط افراد علاقه‌مند برای استفاده شخصی ساخته شده‌اند. در نتیجه، توسعه‌دهندگان مستقل، گروه‌های مذهبی و اجتماع‌ها و حتی علاقه‌مندان، عملا از امکان توسعه و انتشار برنامه‌های خود محروم خواهند شد.
what_registration: "برای نام‌نویسی باید:"
what_req_fee: "پرداخت هزینه به گوگل"
what_req_terms: "پذیرش شرایط و قوانین گوگل"
what_req_id: "ارائه مدرک هویتی برای شناسایی"
what_req_signing: "ارائه مدرکی از کلید امضای خصوصی که برای امضای برنامه‌ها استفاده می‌شود"
what_req_appids: "ثبت تمام شناسه‌های برنامه‌های (فعلی و آینده)"
what_pullquote: "اگر توسعه‌دهنده‌ای همکاری نکند، برنامه‌های او به‌صورت بی‌صدا روی تمام دستگاه‌های اندرویدی در جهان مسدود خواهند شد."

# Who this hurts
impact_heading: "این موضوع به چه کسانی آسیب می‌زند"
impact_you_heading: "شما"
impact_you_p1: "شما یک تلفن همراه اندرویدی خریدید چون گوگل گفته بود این سکوئی باز و آزاد است. می‌توانستید هر چیزی که می‌خواهید نصب کنید — این توافق بود."
impact_you_p2: >-
  حالا گوگل در حال تغییر این توافق است، آن هم به‌صورت یک‌طرفه، روی دستگاهی که شما قبلاً خریده‌اید. بعد از این به‌روزرسانی، فقط برنامه‌هایی اجرا می‌شوند که گوگل تأیید کرده باشد. روی گوشی *شما* که مالک اون هستید، چیزی که *برایش* پول داده‌اید.
impact_dev_heading: "توسعه‌دهندگان مستقل"
impact_dev_p1: "اولین برنامه یک نوجوان، ابزار حریم خصوصی یک داوطلب، یا نگارش آزمایشی داخلی یک شرکت — فرقی نمی‌کند. بعد از شهریور ۱۴۰۵، هیچ‌کدام بدون تأیید گوگل قابل نصب نیستند."
impact_dev_p2: >-
  [اف‌دروید](https://f-droid.org)، این را یک «تهدید وجودی» نامیده است. Cory Doctorow از آن به‌عنوان «[دارث اندروید](https://pluralistic.net/2025/09/01/fulu/)» یاد می‌کند.
impact_gov_heading: "دولت‌ها و جامعه مدنی"
impact_gov_p1: >-
  گوگل [سابقه مستندی](https://www.aclu.org/news/free-speech/app-store-oligopoly) در همکاری با حکومت‌ها برای حذف برنامه‌ها دارد. در این مدل، برنامه‌هایی که زیرساخت کشورها را اجرا می‌کنند، عملاً وابسته به یک شرکت خارجی بدون پاسخگویی خواهند شد.
impact_gov_p2: >-
  [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) این مدل را «مسیر در حال گسترش سانسور اینترنت» می‌داند.

# Advanced flow
flow_heading: "«راه فرار» گوگل در واقع یک تله است"
flow_intro: >-
  گوگل می‌گوید «کاربران حرفه‌ای» هنوز می‌توانند برنامه‌های تأییدنشده را ["نصب کنند"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html). اما *واقعیت* این است:
flow_step1: "ورود به تنظیمات سیستم و گزینه «توسعه‌دهنده» را پیدا کنید"
flow_step2: "روی شماره ساخت **هفت بار** ضربه بزنید تا حالت توسعه‌دهنده فعال شود"
flow_step3: "پیام‌های هشدار دهنده درباره اجبار را رد کنید"
flow_step4: "وارد کردن PIN"
flow_step5: "راه‌اندازی مجدد تلفن همراه"
flow_step6: "**۲۴ ساعت منتظر می‌مانید**"
flow_step7: "برگشت به قسمت قبل و رد کردن پیام‌های هشدار بیشتر"
flow_step8: "انتخاب «اجازه موقت» (۷ روز) یا «اجازه دائمی»"
flow_step9: "تأیید دوباره اینکه «ریسک‌ها» را درک می‌کنید"
flow_summary: "۹ مرحله. یک دوره انتظار اجباری ۲۴ ساعته. *برای نصب برنامه‌ای روی دستگاهی که متعلق به خودتان است.*"
flow_detail: >-
  بدتر از آن: این فرآیند کاملاً از طریق **Google Play Services** اجرا می‌شود، نه خود سیستم‌عامل اندروید؛ گوگل می‌تواند هر زمان آن را تغییر دهد، سخت‌تر کند یا حذف کند — بدون نیاز به به‌روزرسانی سیستم‌عامل و بدون رضایت شما. و تا امروز، حتی در نگارش‌های آزمایشی هم ارائه نشده است.

# Precedent
precedent_heading: "این موضوع فراتر از اندروید است"
precedent_pullquote: "اگر گوگل بتواند میلیاردها دستگاهی را که به‌عنوان سکوی باز فروخته شده‌اند قفل کند، تمام تولیدکنندگان سخت‌افزار در حال تماشا هستند."
precedent_p1: >-
  اصل ماجرا این است: **شرکت سازنده دستگاه شما تصمیم می‌گیرد، حتی بعد از خرید، چه نرم‌افزاری اجازه اجرا دارد.** در دنیای نرم‌افزار به این «rug pull» می‌گویند؛ اما در سخت‌افزار یعنی سلب کامل اختیار از شما.
precedent_p2: >-
  باز بودن اندروید فقط یک ویژگی نبود، بلکه یک *وعده* بود که آن را از آیفون متمایز می‌کرد. میلیون‌ها نفر دقیقاً به همین دلیل اندروید را انتخاب کردند. حالا گوگل این وعده را به‌صورت یک‌طرفه لغو می‌کند
precedent_arstechnica: >-
  [Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *«حسادت گوگل به اپل، میراث باز اندروید را تهدید به نابودی می‌کند.»*

# Objections
objections_heading: "اما صبر کنید، آیا این..."
obj_security_q: "«...فقط برای امنیت نیست؟»"
obj_security_a: >-
  این یک بهانه است. Google Play Protect همین حالا هم بدافزار را بررسی می‌کند. الزام به ارائه هویت واقعی، کد را امن‌تر نمی‌کند — بلکه توسعه‌دهندگان را قابل شناسایی و کنترل می‌کند.
obj_sideloading_q: "«...هنوز می‌شود sideload کرد؟»"
obj_sideloading_a: >-
  ۹ مرحله، ۲۴ ساعت انتظار، و قابل حذف توسط گوگل — این دیگر نصب دستی نیست، بلکه یک **مکانیزم بازدارنده** است.
obj_hide_q: "«...فقط برای کسانی است که چیزی برای پنهان کردن دارند؟»"
obj_hide_a: >-
  افشاگران، خبرنگاران و فعالان — اولین قربانیان خواهند بود. مشارکت ناشناس در متن‌باز، سنتی قدیمی است که این سیاست آن را از بین می‌برد.
obj_apple_q: "«...اپل هم همین کار را می‌کند؟»"
obj_apple_a: >-
  اپل از ابتدا یک اکوسیستم بسته بوده است. مردم اندروید را به‌خاطر باز بودنش انتخاب کردند.
obj_cost_q: "«...فقط ۲۵ دلار و کمی کاغذبازی است؟»"
obj_cost_a: >-
  هزینه فقط مالی نیست؛ شما در حال واگذاری هویت و اطلاعات حساس خود به یک شرکت هستید.

